# ============================================================
# Application
# ============================================================
spring.application.name=flight-booking-system
server.port=8080
server.error.include-message=always

# ============================================================
# Database - MySQL (override in application-prod.properties)
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/flight_booking_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=yourpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# JWT
# ============================================================
# Generate a strong 256-bit (32-byte) base64 secret for production
app.jwt.secret=ZmxpZ2h0Ym9va2luZ3N5c3RlbXNlY3JldGtleWZvcmpzb25fd2VidG9rZW5z
app.jwt.expiration-ms=86400000

# ============================================================
# Email (update with real SMTP credentials)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=noreply@flightbooking.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================================
# Springdoc / Swagger UI
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# ============================================================
# Logging
# ============================================================
logging.level.com.flightbookingapp=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ===========================
# Test Configuration (H2 in-memory)
# ===========================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=false

app.jwt.secret=testSecretKey404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=86400000

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test@test.com
spring.mail.password=test

logging.level.com.flightbookingapp=DEBUG
logging.level.org.springframework.security=DEBUG
